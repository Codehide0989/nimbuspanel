services:
  - type: web
    name: nimbuspanel-ws
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: APP_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET_NAME
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://nimbuspanel.vercel.app
